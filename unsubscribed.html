<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unsubscribed — Swiss Circle</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #07090D;
    color: #C8B98A;
    font-family: Arial, Helvetica, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
  }
  .card {
    max-width: 480px;
    width: 100%;
    text-align: center;
  }
  .gold-line {
    height: 3px;
    background: linear-gradient(90deg, transparent, #C9A84C, transparent);
    margin-bottom: 48px;
  }
  .eyebrow {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.45em;
    color: #C9A84C;
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 0.08em;
    color: #F0E8D0;
    text-transform: uppercase;
    line-height: 1.2;
    margin-bottom: 16px;
  }
  p {
    font-size: 14px;
    line-height: 1.75;
    color: #7A6840;
    margin-bottom: 32px;
  }
  a.btn {
    display: inline-block;
    padding: 13px 32px;
    background: #C9A84C;
    color: #07090D;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 3px;
  }
  .footer {
    margin-top: 48px;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: #2E2A1E;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="gold-line"></div>
    <p class="eyebrow">Swiss Circle</p>
    <h1>You've been<br>unsubscribed</h1>
    <p>You will no longer receive emails from us.<br>We're sorry to see you go.</p>
    <a href="https://www.swisscircle.trade" class="btn">Back to Swiss Circle</a>
    <p class="footer" style="margin-top:48px;">© 2026 Swiss Circle · swisscircle.trade</p>
  </div>
</body>
</html>
